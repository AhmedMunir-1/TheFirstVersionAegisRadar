services:

  # ── ASP.NET Core API ──────────────────────────────────────────────────────────
  aegisradar-api:
    build:
      context: .
      dockerfile: src/AegisRadar.API/Dockerfile
    container_name: aegis-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal,1433;Database=AegisRadarDB;User Id=sa;Password=StrongPassword123;TrustServerCertificate=True;MultipleActiveResultSets=True"
      Jwt__Secret: "${JWT_SECRET:-AegisRadar_SuperSecret_JWT_Key_2024_Production_32ch!!}"
      Jwt__Issuer: "AegisRadar"
      Jwt__Audience: "AegisRadarClients"
      Kafka__BootstrapServers: "host.docker.internal:9092"
      Kafka__TransactionsTopic: "aegis-transactions"
      AiService__BaseUrl: "http://host.docker.internal:8001"
      AiService__PredictEndpoint: "/predict"
    ports:
      - "5001:5000"
    healthcheck:
      test: curl -f http://localhost:5000/health || exit 1
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    networks:
      - aegis-network
    restart: unless-stopped
 
  # ── Worker Service (Kafka Consumer) ───────────────────────────────────────────
  aegisradar-worker:
    build:
      context: .
      dockerfile: src/AegisRadar.Worker/Dockerfile
    container_name: aegis-worker
    depends_on:
      aegisradar-api:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal,1433;Database=AegisRadarDB;User Id=sa;Password=StrongPassword123;TrustServerCertificate=True;MultipleActiveResultSets=True"
      Jwt__Secret: "${JWT_SECRET:-AegisRadar_SuperSecret_JWT_Key_2024_Production_32ch!!}"
      Kafka__BootstrapServers: "host.docker.internal:9092"
      Kafka__TransactionsTopic: "aegis-transactions"
      AiService__BaseUrl: "http://host.docker.internal:8001"
      AiService__PredictEndpoint: "/predict"
      SignalR__HubUrl: "http://aegisradar-api:5000/hubs/fraud-alerts"
    networks:
      - aegis-network
    restart: unless-stopped
 
networks:
  aegis-network:
    driver: bridge
 
volumes:
  redis_data: